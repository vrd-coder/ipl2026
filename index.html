<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IPL 2026 — Match Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #f5a623;
    --gold2: #ffd166;
    --bg: #09090f;
    --bg2: #0f0f1a;
    --bg3: #14141f;
    --card: #16161f;
    --border: rgba(245,166,35,0.18);
    --text: #e8e8f0;
    --muted: #6b6b88;
    --live: #ff4757;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BG noise + glow ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(245,166,35,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(138,43,226,0.07) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(9,9,15,0.85);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .header-badge {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    background: rgba(245,166,35,0.1);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .live-dot {
    display: inline-block; width: 8px; height: 8px;
    background: var(--live); border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.4s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── HERO ── */
  .hero {
    position: relative; z-index: 1;
    text-align: center;
    padding: 4rem 1rem 2rem;
  }

  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 7rem);
    letter-spacing: 6px;
    line-height: 1;
    background: linear-gradient(180deg, #fff 30%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .hero p {
    margin-top: .5rem;
    font-size: 1rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ── FILTER TABS ── */
  .filters {
    position: relative; z-index: 1;
    display: flex; justify-content: center; gap: .5rem;
    flex-wrap: wrap;
    padding: 1.5rem 1rem;
  }

  .filter-btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: .8rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 18px;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
  }

  /* ── NEXT MATCH HERO CARD ── */
  .next-match-wrap {
    position: relative; z-index: 1;
    max-width: 780px;
    margin: 0 auto 3rem;
    padding: 0 1rem;
  }

  .next-match-card {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border: 1px solid rgba(245,166,35,0.35);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(245,166,35,0.1), 0 20px 60px rgba(0,0,0,0.5);
  }

  .next-match-card::before {
    content: 'NEXT MATCH';
    position: absolute; top: 1.2rem; left: 50%; transform: translateX(-50%);
    font-size: .65rem; letter-spacing: 3px; color: var(--gold); font-weight: 700;
  }

  .next-match-card .corner-glow {
    position: absolute; top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .match-teams {
    display: flex; align-items: center; justify-content: center;
    gap: 1.5rem; margin: 1.5rem 0 1rem;
    flex-wrap: wrap;
  }

  .team-block {
    display: flex; flex-direction: column; align-items: center; gap: .5rem;
    min-width: 100px;
  }

  .team-logo {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 1px;
    border: 2px solid rgba(255,255,255,0.15);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    text-align: center;
  }

  .vs-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    opacity: .7;
  }

  .match-meta {
    text-align: center;
    font-size: .85rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 2rem;
  }

  /* ── COUNTDOWN ── */
  .countdown {
    display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;
  }

  .cd-block {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.4rem;
    min-width: 72px;
  }

  .cd-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    line-height: 1;
    background: linear-gradient(180deg, #fff 40%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .cd-label {
    font-size: .6rem; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-top: .2rem;
  }

  /* ── SCHEDULE GRID ── */
  .schedule {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1rem 4rem;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 1.2rem;
    padding-bottom: .5rem;
    border-bottom: 1px solid var(--border);
  }

  .month-group { margin-bottom: 2.5rem; }

  .month-label {
    font-size: .7rem; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: .8rem;
  }

  .match-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 1rem 1.4rem;
    display: grid;
    grid-template-columns: 90px 1fr auto;
    align-items: center;
    gap: 1rem;
    margin-bottom: .6rem;
    transition: all .2s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .match-card::after {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: transparent;
    border-radius: 4px 0 0 4px;
    transition: background .2s;
  }

  .match-card:hover {
    border-color: var(--border);
    background: #1b1b28;
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .match-card:hover::after { background: var(--gold); }

  .match-card.live-card {
    border-color: rgba(255,71,87,0.4);
    background: rgba(255,71,87,0.05);
  }
  .match-card.live-card::after { background: var(--live); }

  .match-card.past { opacity: 0.45; }

  .match-date-block {
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.07);
    padding-right: 1rem;
  }

  .match-day-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    line-height: 1;
    color: #fff;
  }

  .match-day-name {
    font-size: .65rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
  }

  .match-time {
    font-size: .8rem; color: var(--gold);
    font-weight: 600; margin-top: 3px;
  }

  .match-info { display: flex; flex-direction: column; gap: .25rem; }

  .match-teams-row {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 1.5px;
    display: flex; align-items: center; gap: .5rem;
    flex-wrap: wrap;
  }

  .team-pill {
    display: inline-flex; align-items: center; gap: 5px;
  }

  .team-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }

  .match-vs { color: var(--muted); font-size: 1rem; }

  .match-venue {
    font-size: .78rem; color: var(--muted);
    font-family: 'Inter', sans-serif; font-weight: 300;
    display: flex; align-items: center; gap: 4px;
  }

  .match-cd-mini {
    text-align: right;
    min-width: 90px;
  }

  .cd-mini-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--gold);
    white-space: nowrap;
  }

  .cd-mini-label {
    font-size: .6rem; color: var(--muted); letter-spacing: 1px;
    text-transform: uppercase;
  }

  .live-badge {
    background: var(--live);
    color: #fff; font-size: .6rem; font-weight: 700;
    letter-spacing: 1px; padding: 2px 8px; border-radius: 10px;
    text-transform: uppercase; animation: livepulse 1.5s ease infinite;
  }
  @keyframes livepulse {
    0%, 100% { opacity: 1; } 50% { opacity: .6; }
  }

  .done-badge {
    font-size: .7rem; color: var(--muted); font-family: 'Inter', sans-serif;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Responsive ── */
  @media (max-width: 580px) {
    .match-card { grid-template-columns: 70px 1fr; }
    .match-cd-mini { display: none; }
    .match-teams-row { font-size: 1.1rem; }
  }

  /* ── Fade in animation ── */
  .fade-up {
    opacity: 0; transform: translateY(20px);
    animation: fadeUp .5s ease forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .match-card { animation: fadeUp .4s ease forwards; opacity: 0; }
  .match-card:nth-child(1) { animation-delay: .05s; }
  .match-card:nth-child(2) { animation-delay: .1s; }
  .match-card:nth-child(3) { animation-delay: .15s; }
  .match-card:nth-child(4) { animation-delay: .2s; }
  .match-card:nth-child(5) { animation-delay: .25s; }
  .match-card:nth-child(6) { animation-delay: .3s; }
  .match-card:nth-child(7) { animation-delay: .35s; }
  .match-card:nth-child(8) { animation-delay: .4s; }
</style>
</head>

const LIVE_WINDOW = 3.5 * 60 * 60 * 1000; // 3.5 hours

function getStatus(m) {
  const now = Date.now();
  const end = m.date + LIVE_WINDOW;
  if (now >= m.date && now <= end) return 'live';
  if (now > end) return 'past';
  return 'upcoming';
}

function fmtCountdown(ms) {
  if (ms <= 0) return null;
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const min = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (d > 0) return { d, h, min, sec };
  return { d: 0, h, min, sec };
}

function teamColor(code) {
  return TEAMS[code] ? TEAMS[code].color : '#aaa';
}

function teamShort(code) {
  return TEAMS[code] ? TEAMS[code].short : code;
}

function teamName(code) {
  return TEAMS[code] ? TEAMS[code].name : code;
}

function formatISTTime(utcMs) {
  const d = new Date(utcMs);
  const ist = new Date(utcMs + IST_OFFSET);
  const h = ist.getUTCHours();
  const m = ist.getUTCMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  return `${hh}:${m.toString().padStart(2,'0')} ${ampm} IST`;
}

function formatDate(utcMs) {
  const ist = new Date(utcMs + IST_OFFSET);
  return {
    day: ist.getUTCDate(),
    dayName: ['SUN','MON','TUE','WED','THU','FRI','SAT'][ist.getUTCDay()],
    month: ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][ist.getUTCMonth()],
    fullMonth: ['January','February','March','April','May','June','July','August','September','October','November','December'][ist.getUTCMonth()],
    year: ist.getUTCFullYear(),
  };
}

// ── NEXT MATCH HERO ──
function renderNextMatch() {
  const now = Date.now();
  const upcoming = matches.filter(m => !m.playoff && getStatus(m) === 'upcoming');
  if (!upcoming.length) {
    document.getElementById('nextMatchWrap').innerHTML = '';
    return;
  }
  const m = upcoming[0];
  const d = formatDate(m.date);
  const t1 = TEAMS[m.t1] || {};
  const t2 = TEAMS[m.t2] || {};
  document.getElementById('nextMatchWrap').innerHTML = `
    <div class="next-match-card">
      <div class="corner-glow"></div>
      <div class="match-teams">
        <div class="team-block">
          <div class="team-logo" style="background:${t1.bg||'#111'};color:${t1.color||'#fff'}">${m.t1}</div>
          <div class="team-name" style="color:${t1.color||'#fff'}">${m.t1}</div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="team-block">
          <div class="team-logo" style="background:${t2.bg||'#111'};color:${t2.color||'#fff'}">${m.t2}</div>
          <div class="team-name" style="color:${t2.color||'#fff'}">${m.t2}</div>
        </div>
      </div>
      <div class="match-meta">
        📅 ${d.dayName}, ${d.day} ${d.month} ${d.year} &nbsp;·&nbsp; ${formatISTTime(m.date)}<br>
        📍 ${m.venue}
      </div>
      <div class="countdown" id="heroCD"></div>
    </div>`;
  updateHeroCD(m);
}

function updateHeroCD(m) {
  const rem = m.date - Date.now();
  const cd = fmtCountdown(rem);
  const el = document.getElementById('heroCD');
  if (!el) return;
  if (!cd) { el.innerHTML = '<div style="color:var(--live);font-family:\'Bebas Neue\',sans-serif;font-size:1.5rem;letter-spacing:3px;">MATCH IN PROGRESS</div>'; return; }
  el.innerHTML = `
    ${cd.d > 0 ? `<div class="cd-block"><div class="cd-num" id="cdD">${cd.d}</div><div class="cd-label">Days</div></div>` : ''}
    <div class="cd-block"><div class="cd-num" id="cdH">${String(cd.h).padStart(2,'0')}</div><div class="cd-label">Hours</div></div>
    <div class="cd-block"><div class="cd-num" id="cdM">${String(cd.min).padStart(2,'0')}</div><div class="cd-label">Mins</div></div>
    <div class="cd-block"><div class="cd-num" id="cdS">${String(cd.sec).padStart(2,'0')}</div><div class="cd-label">Secs</div></div>`;
}

// ── SCHEDULE ──
let currentFilter = 'all';

function renderSchedule() {
  const groups = {};
  matches.forEach(m => {
    const status = getStatus(m);
    if (currentFilter !== 'all' && status !== currentFilter) return;
    const d = formatDate(m.date);
    const key = `${d.year}-${String(d.month).padStart(3,'0')}`;
    const label = `${d.fullMonth} ${d.year}`;
    if (!groups[key]) groups[key] = { label, items: [] };
    groups[key].items.push(m);
  });

  const container = document.getElementById('scheduleList');
  if (!Object.keys(groups).length) {
    container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:3rem;font-size:1.1rem;">No matches to show</div>';
    return;
  }

  container.innerHTML = Object.keys(groups).sort().map(key => {
    const g = groups[key];
    return `<div class="month-group">
      <div class="month-label">${g.label}</div>
      ${g.items.map(m => renderMatchCard(m)).join('')}
    </div>`;
  }).join('');

  // Re-attach countdowns
  startMiniCountdowns();
}

function renderMatchCard(m) {
  const status = getStatus(m);
  const d = formatDate(m.date);
  const rem = m.date - Date.now();
  const cd = fmtCountdown(rem);

  let cdHtml = '';
  if (status === 'live') {
    cdHtml = `<div class="match-cd-mini"><span class="live-badge">🔴 LIVE</span></div>`;
  } else if (status === 'past') {
    cdHtml = `<div class="match-cd-mini"><span class="done-badge">✓ Done</span></div>`;
  } else if (cd) {
    let cdStr = '';
    if (cd.d > 0) cdStr = `${cd.d}d ${cd.h}h`;
    else if (cd.h > 0) cdStr = `${cd.h}h ${String(cd.min).padStart(2,'0')}m`;
    else cdStr = `${String(cd.min).padStart(2,'0')}m ${String(cd.sec).padStart(2,'0')}s`;
    cdHtml = `<div class="match-cd-mini">
      <div class="cd-mini-num" data-matchid="${m.id}">${cdStr}</div>
      <div class="cd-mini-label">until kickoff</div>
    </div>`;
  }

  const isPlayoff = !!m.playoff;
  let teamsHtml;
  if (isPlayoff) {
    teamsHtml = `<div class="match-teams-row" style="color:var(--gold)">${m.playoff}</div>`;
  } else {
    teamsHtml = `<div class="match-teams-row">
      <span class="team-pill">
        <span class="team-dot" style="background:${teamColor(m.t1)}"></span>
        <span>${m.t1}</span>
      </span>
      <span class="match-vs">vs</span>
      <span class="team-pill">
        <span class="team-dot" style="background:${teamColor(m.t2)}"></span>
        <span>${m.t2}</span>
      </span>
    </div>`;
  }

  return `<div class="match-card ${status === 'live' ? 'live-card' : ''} ${status === 'past' ? 'past' : ''}" data-id="${m.id}">
    <div class="match-date-block">
      <div class="match-day-num">${d.day}</div>
      <div class="match-day-name">${d.dayName} ${d.month}</div>
      <div class="match-time">${formatISTTime(m.date)}</div>
    </div>
    <div class="match-info">
      ${teamsHtml}
      <div class="match-venue">📍 ${m.venue}</div>
    </div>
    ${cdHtml}
  </div>`;
}

function startMiniCountdowns() {
  // Update every second
}

function updateLiveHeader() {
  const liveMatches = matches.filter(m => getStatus(m) === 'live');
  const el = document.getElementById('liveHeader');
  if (liveMatches.length) {
    el.innerHTML = `<span class="live-dot"></span>${liveMatches.length} LIVE`;
  } else {
    el.innerHTML = 'TATA IPL 2026';
  }
}

// ── FILTERS ──
document.getElementById('filterBar').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  renderSchedule();
});

// ── COUNTDOWN TICKER ──
let nextMatch = null;

function getNextMatch() {
  const now = Date.now();
  const upcoming = matches.filter(m => !m.playoff && getStatus(m) === 'upcoming');
  return upcoming.length ? upcoming[0] : null;
}

function tick() {
  const now = Date.now();
  updateLiveHeader();

  // Hero countdown
  const nm = getNextMatch();
  if (nm) {
    const cd = fmtCountdown(nm.date - now);
    const el = document.getElementById('heroCD');
    if (el && cd) {
      const dEl = document.getElementById('cdD');
      const hEl = document.getElementById('cdH');
      const mEl = document.getElementById('cdM');
      const sEl = document.getElementById('cdS');
      if (dEl) dEl.textContent = cd.d;
      if (hEl) hEl.textContent = String(cd.h).padStart(2,'0');
      if (mEl) mEl.textContent = String(cd.min).padStart(2,'0');
      if (sEl) sEl.textContent = String(cd.sec).padStart(2,'0');
    }
  }

  // Mini countdowns in schedule
  matches.forEach(m => {
    const el = document.querySelector(`[data-matchid="${m.id}"]`);
    if (!el) return;
    const rem = m.date - now;
    const cd = fmtCountdown(rem);
    if (!cd) return;
    let s = '';
    if (cd.d > 0) s = `${cd.d}d ${cd.h}h`;
    else if (cd.h > 0) s = `${cd.h}h ${String(cd.min).padStart(2,'0')}m`;
    else s = `${String(cd.min).padStart(2,'0')}m ${String(cd.sec).padStart(2,'0')}s`;
    el.textContent = s;
  });
}

// ── INIT ──
renderNextMatch();
renderSchedule();
updateLiveHeader();
setInterval(tick, 1000);
tick();
</script>
